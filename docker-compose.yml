services:
  registry:
    image: registry:2
    container_name: weather-llm-registry
    restart: unless-stopped
    ports:
      - "${LOCAL_REGISTRY_PORT:-5000}:5000"
    volumes:
      - weather-llm-registry-data:/var/lib/registry
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  nwsalerts-mariadb:
    image: mariadb:11
    container_name: weather-llm-nwsalerts-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-emwin}
      MARIADB_USER: ${MARIADB_USER:-emwin_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-emwin_pass}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-emwin_root_pass}
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    volumes:
      - weather-llm-nwsalerts-mariadb-data:/var/lib/mysql
      - ../nwsAlerts/emwin_2026-02-16.sql:/docker-entrypoint-initdb.d/010-emwin_2026-02-16.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD:-emwin_root_pass}"]
      interval: 5s
      timeout: 5s
      retries: 40
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  postgres:
    image: postgres:16-alpine
    container_name: weather-llm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weather_llm}
      POSTGRES_USER: ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - weather-llm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_llm}"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: weather-llm-qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':18BD' /proc/net/tcp /proc/net/tcp6"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - weather-llm-qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Ollama pre-flight ──────────────────────────────────────────────────────
  # Verifies that the external Ollama host is reachable AND that the required
  # model is already pulled before the api/api-worker containers start.
  # If this check fails the api and api-worker containers will not start.
  ollama-preflight:
    image: curlimages/curl:latest
    container_name: weather-llm-ollama-preflight
    restart: "no"
    volumes:
      - ./scripts/ollama-preflight.sh:/scripts/ollama-preflight.sh:ro
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.7.176:11434}
      OLLAMA_CHAT_BASE_URL: ${OLLAMA_CHAT_BASE_URL:-}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:1.7b}
    command: ["sh", "/scripts/ollama-preflight.sh"]
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  api-migrate:
    image: ${WEATHER_LLM_API_IMAGE:-weather-llm-api:local}
    build:
      context: ../weather-llm-api
      dockerfile: Dockerfile
    container_name: weather-llm-api-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_llm}?schema=public
    command: sh -c "(npx prisma migrate resolve --applied 20260216000000_init_prompt_log >/dev/null 2>&1 || true) && npm run prisma:migrate:deploy"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  api:
    image: ${WEATHER_LLM_API_IMAGE:-weather-llm-api:local}
    build:
      context: ../weather-llm-api
      dockerfile: Dockerfile
    container_name: weather-llm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      nwsalerts-mariadb:
        condition: service_healthy
      ollama-preflight:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_llm}?schema=public
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.7.176:11434}
      OLLAMA_CHAT_BASE_URL: ${OLLAMA_CHAT_BASE_URL:-}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:1.7b}
      NWS_HEALTH_GENERATION_TIMEOUT_MS: ${NWS_HEALTH_GENERATION_TIMEOUT_MS:-15000}
      NWS_ANSWER_TIMEOUT_MS: ${NWS_ANSWER_TIMEOUT_MS:-120000}
      NWS_ANSWER_MAX_TOKENS: ${NWS_ANSWER_MAX_TOKENS:-1024}
      NWS_ANSWER_MAX_CONTEXT_CHARS: ${NWS_ANSWER_MAX_CONTEXT_CHARS:-6000}
      NWS_OUTLOOK_SUMMARY_ENABLED: ${NWS_OUTLOOK_SUMMARY_ENABLED:-true}
      NWS_OUTLOOK_SUMMARY_PROMPT_LAYOUT: ${NWS_OUTLOOK_SUMMARY_PROMPT_LAYOUT:-multiline}
      NWS_OUTLOOK_SUMMARY_TIMEOUT_MS: ${NWS_OUTLOOK_SUMMARY_TIMEOUT_MS:-90000}
      NWS_OUTLOOK_SUMMARY_TEMPERATURE: ${NWS_OUTLOOK_SUMMARY_TEMPERATURE:-0.1}
      NWS_OUTLOOK_SUMMARY_MAX_TOKENS: ${NWS_OUTLOOK_SUMMARY_MAX_TOKENS:-280}
      NWS_EMBEDDING_MODEL: ${NWS_EMBEDDING_MODEL:-Xenova/all-MiniLM-L6-v2}
      NWS_EMBEDDING_TIMEOUT_MS: ${NWS_EMBEDDING_TIMEOUT_MS:-30000}
      NWS_EMBEDDING_CACHE_DIR: ${NWS_EMBEDDING_CACHE_DIR:-/app/.cache/transformers}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NWS_ALERTS: ${QDRANT_COLLECTION_NWS_ALERTS:-nws_alerts_embeddings_v1}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-384}
      NWS_ALERTS_DB_HOST: nwsalerts-mariadb
      NWS_ALERTS_DB_PORT: "3306"
      NWS_ALERTS_DB_USER: ${MARIADB_USER:-emwin_user}
      NWS_ALERTS_DB_PASSWORD: ${MARIADB_PASSWORD:-emwin_pass}
      NWS_ALERTS_DB_NAME: ${MARIADB_DATABASE:-emwin}
      NWS_EMBED_QUEUE_WORKER_ENABLED: "false"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - weather-llm-embedding-model-cache:/app/.cache/transformers
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  nwsalerts:
    image: ${WEATHER_LLM_NWSALERTS_IMAGE:-weather-llm-nwsalerts:local}
    build:
      context: ../nwsAlerts
      dockerfile: Dockerfile
    container_name: weather-llm-nwsalerts
    restart: unless-stopped
    depends_on:
      nwsalerts-mariadb:
        condition: service_healthy
      nwsalerts-schema:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MARIADB_USER:-emwin_user}:${MARIADB_PASSWORD:-emwin_pass}@nwsalerts-mariadb:3306/${MARIADB_DATABASE:-emwin}
      WEATHER_LLM_API_BASE_URL: http://weather-llm-api:3000
      NWS_OUTLOOK_SUMMARY_REQUEST_TIMEOUT_MS: ${NWS_OUTLOOK_SUMMARY_REQUEST_TIMEOUT_MS:-120000}
      MY_LAT: ${MY_LAT:-36.41164391680596}
      MY_LON: ${MY_LON:--95.93253616680347}
      ALERT_EMAIL_USER: ${ALERT_EMAIL_USER:-}
      ALERT_EMAIL_PASS: ${ALERT_EMAIL_PASS:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      AQI_ALERTS_ENABLED: ${AQI_ALERTS_ENABLED:-false}
      AIRNOW_API_KEY: ${AIRNOW_API_KEY:-}
      AQI_OBSERVED_THRESHOLD: ${AQI_OBSERVED_THRESHOLD:-101}
      AQI_FORECAST_THRESHOLD: ${AQI_FORECAST_THRESHOLD:-101}
      AIRNOW_DISTANCE_MILES: ${AIRNOW_DISTANCE_MILES:-25}
      NWS_ALERTS_MANUAL_TRIGGER_ENABLED: ${NWS_ALERTS_MANUAL_TRIGGER_ENABLED:-false}
      NWS_ALERTS_MANUAL_TRIGGER_HOST: ${NWS_ALERTS_MANUAL_TRIGGER_HOST:-127.0.0.1}
      NWS_ALERTS_MANUAL_TRIGGER_PORT: "${NWS_ALERTS_MANUAL_TRIGGER_PORT:-3011}"
      NWS_ALERTS_REQUIRE_BOOTSTRAP_DATA: "false"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs'); const numeric=(entry)=>entry.length>0 && entry.split('').every((char)=>char>='0' && char<='9'); const ok=fs.readdirSync('/proc').filter(numeric).some((pid)=>{ try { return fs.readFileSync('/proc/' + pid + '/cmdline', 'utf8').includes('node'); } catch { return false; } }); process.exit(ok ? 0 : 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  api-worker:
    image: ${WEATHER_LLM_API_IMAGE:-weather-llm-api:local}
    build:
      context: ../weather-llm-api
      dockerfile: Dockerfile
    container_name: weather-llm-api-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      ollama-preflight:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_llm}?schema=public
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.7.176:11434}
      OLLAMA_CHAT_BASE_URL: ${OLLAMA_CHAT_BASE_URL:-}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:1.7b}
      NWS_EMBEDDING_MODEL: ${NWS_EMBEDDING_MODEL:-Xenova/all-MiniLM-L6-v2}
      NWS_EMBEDDING_TIMEOUT_MS: ${NWS_EMBEDDING_TIMEOUT_MS:-30000}
      NWS_EMBEDDING_CACHE_DIR: ${NWS_EMBEDDING_CACHE_DIR:-/app/.cache/transformers}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NWS_ALERTS: ${QDRANT_COLLECTION_NWS_ALERTS:-nws_alerts_embeddings_v1}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-384}
      NWS_EMBED_QUEUE_WORKER_ENABLED: "true"
    volumes:
      - weather-llm-embedding-model-cache:/app/.cache/transformers
    command: ["npm", "run", "start:worker"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs'); const numeric=(entry)=>entry.length>0 && entry.split('').every((char)=>char>='0' && char<='9'); const ok=fs.readdirSync('/proc').filter(numeric).some((pid)=>{ try { return fs.readFileSync('/proc/' + pid + '/cmdline', 'utf8').includes('node'); } catch { return false; } }); process.exit(ok ? 0 : 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  client:
    image: ${WEATHER_LLM_CLIENT_IMAGE:-weather-llm-client:local}
    build:
      context: ../weather-llm
      dockerfile: Dockerfile
      args:
        VITE_WEATHER_LLM_API_BASE_URL: ${VITE_WEATHER_LLM_API_BASE_URL:-http://localhost:3000}
        VITE_SSE_IDLE_TIMEOUT_MS: ${VITE_SSE_IDLE_TIMEOUT_MS:-150000}
    container_name: weather-llm-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${CLIENT_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  nwsalerts-schema:
    image: ${WEATHER_LLM_NWSALERTS_IMAGE:-weather-llm-nwsalerts:local}
    build:
      context: ../nwsAlerts
      dockerfile: Dockerfile
    container_name: weather-llm-nwsalerts-schema
    restart: "no"
    depends_on:
      nwsalerts-mariadb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MARIADB_USER:-emwin_user}:${MARIADB_PASSWORD:-emwin_pass}@nwsalerts-mariadb:3306/${MARIADB_DATABASE:-emwin}
    command: ["npm", "run", "prisma:db:push"]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  weather-llm-registry-data:
  weather-llm-nwsalerts-mariadb-data:
  weather-llm-postgres-data:
  weather-llm-qdrant-data:
  weather-llm-embedding-model-cache:
